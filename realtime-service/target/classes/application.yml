server:
  port: 8083

spring:
  application:
    name: realtime-service
  data:
    redis:
      host: localhost
      port: 6379
    mongodb:
      uri: mongodb://localhost:27019/realtime_db

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
  endpoint:
    health:
      probes:
        enabled: true

app:
  events:
    topic: room-events
    realtime-topic: realtime-events
  security:
    jwt:
      secret: ${JWT_SECRET:orcalab-dev-secret-cambiar-en-produccion-minimo-256-bits-de-largo}

logging:
  file:
    name: logs/${spring.application.name}.log
  pattern:
    file: '%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n'