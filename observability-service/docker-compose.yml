services:
  prometheus:
    image: prom/prometheus:latest
    container_name: orcalab-prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
    extra_hosts:
      - "host.docker.internal:host-gateway"

  loki:
    image: grafana/loki:2.9.0
    container_name: orcalab-loki
    ports:
      - "3100:3100"
    volumes:
      - ./loki/loki-config.yml:/etc/loki/local-config.yaml
    command: -config.file=/etc/loki/local-config.yaml

  promtail:
    image: grafana/promtail:2.9.0
    container_name: orcalab-promtail
    volumes:
      - ./promtail/promtail-config.yml:/etc/promtail/config.yml
      - ../auth-service/logs:/var/log/orcalab/auth-service/logs
      - ../room-service/logs:/var/log/orcalab/room-service/logs
      - ../realtime-service/logs:/var/log/orcalab/realtime-service/logs
      - ../reporting-service/logs:/var/log/orcalab/reporting-service/logs
    command: -config.file=/etc/promtail/config.yml
    depends_on:
      - loki

  grafana:
    image: grafana/grafana:latest
    container_name: orcalab-grafana
    ports:
      - "3000:3000"
    volumes:
      - grafana-data:/var/lib/grafana
      - ./grafana/provisioning:/etc/grafana/provisioning
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=admin
    depends_on:
      - prometheus
      - loki

volumes:
  grafana-data: